<!DOCTYPE html>

        .rabbit-ears { font-size: 40px; cursor: pointer; transition: transform 0.3s; margin-top: 30px; display: inline-block; }
        .rabbit-ears:hover { transform: scale(1.2) rotate(10deg); }
